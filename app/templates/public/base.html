<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}InternStart{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="{% block body_class %}{% endblock %}">
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="logo" href="{{ url_for('public.home') }}">InternStart</a>
      <nav>
        <a href="{{ url_for('public.home') }}">Главная</a>
        <a href="{{ url_for('public.catalog') }}">Каталог</a>
        <a href="{{ url_for('public.companies') }}">Компании</a>
        <a href="{{ url_for('public.applications_board') }}">Мои подачи</a>
      </nav>
    </div>
  </header>

  <main class="container {% block main_class %}{% endblock %}">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="flash-group">
        {% for category, message in messages %}
          <div class="flash flash-{{ 'error' if category == 'error' else 'success' }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
