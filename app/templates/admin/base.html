<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin | InternStart{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<header class="site-header admin-header">
  <div class="container nav-wrap">
    <nav class="top-switcher top-switcher-admin">
      <a class="{% if request.endpoint and request.endpoint.startswith('admin.intern') %}active{% endif %}" href="{{ url_for('admin.internships') }}">Стажировки</a>
      <a class="{% if request.endpoint and request.endpoint.startswith('admin.compan') %}active{% endif %}" href="{{ url_for('admin.companies') }}">Компании</a>
      <a class="{% if request.endpoint and request.endpoint.startswith('admin.import') %}active{% endif %}" href="{{ url_for('admin.imports_page') }}">Импорт</a>
      <a class="{% if request.endpoint and request.endpoint.startswith('public.') %}active{% endif %}" href="{{ url_for('public.home') }}">Public</a>
      {% if is_admin %}<a href="{{ url_for('admin.logout') }}">Выход</a>{% endif %}
    </nav>
  </div>
</header>
<main class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-group">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
