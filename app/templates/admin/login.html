{% extends 'admin/base.html' %}
{% block title %}Вход в админку{% endblock %}
{% block content %}
<section class="auth-box">
  <h1>Вход в админ-панель</h1>
  {% if config_error %}
    <p class="empty">Не настроены `ADMIN_USERNAME` и/или `ADMIN_PASSWORD` в .env</p>
  {% endif %}
  <form method="post" class="simple-form">
    <div class="field"><label>Логин</label><input name="username" required></div>
    <div class="field"><label>Пароль</label><input type="password" name="password" required></div>
    <button class="btn" type="submit">Войти</button>
  </form>
</section>
{% endblock %}
